services:
  step-ui-ng:
    build: .
    image: ghcr.io/nofuturekid/step-ui-ng:latest
    container_name: step-ui-ng
    ports:
      - "8080:8080"
    environment:
      # The only optional knobs; everything else is configured in the UI.
      - PORT=8080
      - DATA_DIR=/data
      # Default validity (days) pre-filled on the renew form; the provisioner's
      # own maximum still applies. Defaults to 90 when unset.
      # - RENEW_DEFAULT_DAYS=90
    volumes:
      - ./data:/data
    restart: unless-stopped
