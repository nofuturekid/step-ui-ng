name: CI

# Go lint/vet/test. Skipped for docs-only changes (paths-ignore) — there are no
# required status checks on main, so a skipped run does not block merges.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "spec/**"
      - "deploy/**"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "spec/**"
      - "deploy/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  go:
    name: Go (lint, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: templ generate (check for diffs)
        run: |
          go tool templ generate
          git diff --exit-code -- '*_templ.go' || {
            echo "templ output is stale; run 'go tool templ generate' and commit"; exit 1;
          }

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: test
        run: go test ./...
