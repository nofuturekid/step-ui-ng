name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  go:
    name: Go (lint, vet, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          # Enable caching once dependencies (a go.sum) exist.
          cache: false

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest

      - name: templ generate (check for diffs)
        run: |
          templ generate
          git diff --exit-code -- '*_templ.go' || {
            echo "templ output is stale; run 'templ generate' and commit"; exit 1;
          }

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6

      - name: test
        run: go test ./...
