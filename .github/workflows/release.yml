name: Release - Build and Publish Image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nofuturekid/step-ui-ng

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, image: true }
          - { goos: linux, goarch: arm64, image: true }
          - { goos: linux, goarch: arm }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templ
        run: go tool templ generate

      - name: Build, package, checksum, upload
        env:
          TAG: ${{ github.event.release.tag_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOFLAGS: -trimpath
          GH_TOKEN: ${{ github.token }}
          IS_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          VERSION="${TAG:-dev-${GITHUB_SHA::7}}"
          mkdir -p dist
          bin="stepui"
          if [ "$GOOS" = "windows" ]; then bin="stepui.exe"; fi
          go build \
            -ldflags "-s -w -X github.com/nofuturekid/step-ui-ng/internal/app.Version=${VERSION}" \
            -o "dist/${bin}" ./cmd/stepui
          name="stepui_${VERSION}_${GOOS}_${GOARCH}"
          ( cd dist
            if [ "$GOOS" = "windows" ]; then
              zip -q "${name}.zip" "$bin"
              archive="${name}.zip"
            else
              tar -czf "${name}.tar.gz" "$bin"
              archive="${name}.tar.gz"
            fi
            sha256sum "$archive" > "${archive}.sha256"
            if [ -n "${TAG:-}" ]; then
              gh release upload "$TAG" "$archive" "${archive}.sha256" --clobber
            fi
            if [ "${IS_IMAGE:-}" = "true" ]; then
              cp "$bin" "stepui_linux_${GOARCH}"
            fi
          )

      - name: Upload raw linux binary for the image job
        if: ${{ matrix.image }}
        uses: actions/upload-artifact@v7
        with:
          name: rawbin-linux-${{ matrix.goarch }}
          path: dist/stepui_linux_${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 1

  image:
    name: Build and push container image
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download prebuilt linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: rawbin-linux-*
          path: dist
          merge-multiple: true

      - name: Restore executable bit (upload-artifact drops it)
        run: chmod +x dist/stepui_linux_*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          TAG: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ -n "$TAG" ]; then
            if [ "$PRERELEASE" = "true" ]; then
              # Prerelease → moving :edge channel (bleeding edge) + the exact tag.
              echo "tags=${IMAGE}:edge,${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
            else
              # Stable → :latest (default pull) + :edge + the exact tag. A stable
              # build is also the newest build, so it advances :edge too — keeping
              # the invariant :edge ⊇ :latest (ADR-0015).
              echo "tags=${IMAGE}:latest,${IMAGE}:edge,${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tags=${IMAGE}:manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (multi-arch, from prebuilt binary)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
