name: Main - dev artifacts and :main image

# Builds the current ref and produces downloadable binary artifacts + pushes the
# moving :main container tag. Creates NO git tag, NO GitHub release, and NO immutable
# per-commit tag — zero inflation; the :main tag just moves. Version derived from
# `git describe` (e.g. v0.3.0-3-g<sha>) so the exact commit is still identifiable from
# the running binary. See ADR-0015.
#
# Runs automatically on every push to main (so :main always reflects main), except for
# docs-only changes (paths-ignore), and on demand via workflow_dispatch.
on:
  workflow_dispatch:
  push:
    branches: [main]
    # Rebuild :main only when the binary/image could change. Skip docs and workflow
    # edits (.github) — change the build logic? trigger a build via workflow_dispatch.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "spec/**"
      - "deploy/**"
      - "LICENSE"
      - ".github/**"

# Only the newest main build matters; cancel an in-progress one when a newer push lands.
concurrency:
  group: main-build
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/nofuturekid/step-ui-ng

jobs:
  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, image: true }
          - { goos: linux, goarch: arm64, image: true }
          - { goos: linux, goarch: arm }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templ
        run: go tool templ generate

      - name: Build, package, checksum
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          GOFLAGS: -trimpath
          IS_IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always)"
          mkdir -p dist
          bin="stepui"
          if [ "$GOOS" = "windows" ]; then bin="stepui.exe"; fi
          go build \
            -ldflags "-s -w -X github.com/nofuturekid/step-ui-ng/internal/app.Version=${VERSION}" \
            -o "dist/${bin}" ./cmd/stepui
          name="stepui_${VERSION}_${GOOS}_${GOARCH}"
          ( cd dist
            if [ "$GOOS" = "windows" ]; then
              zip -q "${name}.zip" "$bin"
            else
              tar -czf "${name}.tar.gz" "$bin"
            fi
            archive=$(ls "${name}".* | grep -v '\.sha256$')
            sha256sum "$archive" > "${archive}.sha256"
            if [ "${IS_IMAGE:-}" = "true" ]; then
              cp "$bin" "stepui_linux_${GOARCH}"
            fi
          )

      - name: Upload binary archive (downloadable from this run)
        uses: actions/upload-artifact@v7
        with:
          name: stepui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/stepui_*.tar.gz
            dist/stepui_*.tar.gz.sha256
            dist/stepui_*.zip
            dist/stepui_*.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload raw linux binary for the image job
        if: ${{ matrix.image }}
        uses: actions/upload-artifact@v7
        with:
          name: rawbin-linux-${{ matrix.goarch }}
          path: dist/stepui_linux_${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 1

  image:
    name: Build and push :main image
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download prebuilt linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: rawbin-linux-*
          path: dist
          merge-multiple: true

      - name: Restore executable bit (upload-artifact drops it)
        run: chmod +x dist/stepui_linux_*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          echo "tags=${IMAGE}:main" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch, from prebuilt binary)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
